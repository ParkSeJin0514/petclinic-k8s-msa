---
# Tracing Server (Zipkin) Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tracing-server
  namespace: petclinic
  labels:
    app: tracing-server
    tier: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tracing-server
  template:
    metadata:
      labels:
        app: tracing-server
        tier: monitoring
    spec:
      containers:
        - name: zipkin
          image: openzipkin/zipkin:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 9411
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 300m
              memory: 512Mi
          # Health Check
          livenessProbe:
            httpGet:
              path: /health
              port: 9411
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 9411
            initialDelaySeconds: 20
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
---
# Tracing Server Service
apiVersion: v1
kind: Service
metadata:
  name: tracing-server
  namespace: petclinic
  labels:
    app: tracing-server
spec:
  selector:
    app: tracing-server
  ports:
    - name: http
      port: 9411
      targetPort: 9411
  type: ClusterIP
